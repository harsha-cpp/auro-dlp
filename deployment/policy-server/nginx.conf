# AURO-DLP — Reverse proxy for policy server + admin dashboard.
# Drop into /etc/nginx/sites-available/auro-dlp and symlink into sites-enabled.
#
# Assumes:
#   * Node policy server listens on 127.0.0.1:8443 (cleartext loopback)
#   * Static dashboard built into /opt/auro-policy-server/admin-dashboard/dist
#   * TLS certificate from your internal CA at /etc/ssl/auro-dlp/

server {
    listen 80;
    server_name dlp.hospital.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dlp.hospital.local;

    ssl_certificate     /etc/ssl/auro-dlp/server.crt;
    ssl_certificate_key /etc/ssl/auro-dlp/server.key;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:auro:10m;
    ssl_session_timeout 1d;

    # Mutual-TLS for endpoint enrollments (required by /api/v1/agents/*)
    ssl_client_certificate /etc/ssl/auro-dlp/agent-ca.crt;
    ssl_verify_client optional;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

    client_max_body_size 8m;

    # Dashboard SPA
    root /opt/auro-policy-server/admin-dashboard/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Client-Cert-Verified $ssl_client_verify;
        proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;

        # Agent enrollments require client certs once bootstrapped
        if ($request_uri ~* ^/api/v1/agents/(?!enroll)) {
            set $require_cert 1;
        }
        if ($require_cert = 1) {
            if ($ssl_client_verify != SUCCESS) {
                return 401;
            }
        }
    }

    # WebSocket for real-time dashboard updates
    location /api/v1/stream {
        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
    }

    # Force-install update manifest for browsers
    location /extension/ {
        alias /opt/auro-policy-server/extension-dist/;
        autoindex off;
        add_header Cache-Control "public, max-age=300";
    }
}
