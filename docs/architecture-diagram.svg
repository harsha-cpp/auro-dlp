<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Inter, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#f8fafc"/>
  <text x="40" y="40" font-size="22" font-weight="700" fill="#0f172a">AURO-DLP — Architecture</text>
  <text x="40" y="62" fill="#475569">Hospital endpoint DLP for Gmail (Chrome / Edge on Windows)</text>

  <!-- Endpoint -->
  <rect x="40" y="100" width="640" height="540" rx="14" fill="url(#g1)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="60" y="128" font-weight="700" fill="#1e1b4b">Windows Endpoint</text>

  <!-- Browser -->
  <rect x="60" y="148" width="600" height="180" rx="10" fill="#fff" stroke="#94a3b8"/>
  <text x="80" y="172" font-weight="700">Chrome / Edge</text>
  <rect x="80" y="186" width="560" height="124" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="100" y="208" font-weight="700">AURO-DLP Extension (MV3)</text>
  <text x="100" y="228" fill="#334155">• Content script on mail.google.com</text>
  <text x="100" y="246" fill="#334155">• Send-button intercept • Paste / Drop / Upload hooks</text>
  <text x="100" y="264" fill="#334155">• Modal warning UI (shadow DOM) • Admin override flow</text>
  <text x="100" y="282" fill="#334155">• Force-installed by Group Policy / Chrome Enterprise</text>

  <!-- Agent -->
  <rect x="60" y="350" width="600" height="270" rx="10" fill="#fff" stroke="#94a3b8"/>
  <text x="80" y="374" font-weight="700">Endpoint Agent (Go, LocalSystem service)</text>

  <rect x="80" y="390" width="180" height="60" rx="6" fill="url(#g2)" stroke="#0e7490"/>
  <text x="170" y="416" text-anchor="middle" font-weight="700">Detector</text>
  <text x="170" y="434" text-anchor="middle" fill="#334155">regex • NER • ML</text>

  <rect x="270" y="390" width="180" height="60" rx="6" fill="url(#g2)" stroke="#0e7490"/>
  <text x="360" y="416" text-anchor="middle" font-weight="700">Parser</text>
  <text x="360" y="434" text-anchor="middle" fill="#334155">PDF • DOCX • XLSX • ZIP</text>

  <rect x="460" y="390" width="180" height="60" rx="6" fill="url(#g2)" stroke="#0e7490"/>
  <text x="550" y="416" text-anchor="middle" font-weight="700">OCR</text>
  <text x="550" y="434" text-anchor="middle" fill="#334155">Tesseract eng+hin</text>

  <rect x="80" y="460" width="180" height="60" rx="6" fill="url(#g2)" stroke="#0e7490"/>
  <text x="170" y="486" text-anchor="middle" font-weight="700">Policy cache</text>
  <text x="170" y="504" text-anchor="middle" fill="#334155">Ed25519-verified YAML</text>

  <rect x="270" y="460" width="180" height="60" rx="6" fill="url(#g2)" stroke="#0e7490"/>
  <text x="360" y="486" text-anchor="middle" font-weight="700">Audit</text>
  <text x="360" y="504" text-anchor="middle" fill="#334155">AES-GCM, signed chain</text>

  <rect x="460" y="460" width="180" height="60" rx="6" fill="url(#g2)" stroke="#0e7490"/>
  <text x="550" y="486" text-anchor="middle" font-weight="700">Tamper / Watchdog</text>
  <text x="550" y="504" text-anchor="middle" fill="#334155">Self-hash + sibling svc</text>

  <rect x="80" y="530" width="560" height="80" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="100" y="554" font-weight="700">REST + WebSocket on 127.0.0.1:7443 (mTLS)</text>
  <text x="100" y="574" fill="#334155">Per-install client cert provisioned by MSI</text>
  <text x="100" y="592" fill="#334155">/v1/inspect, /v1/override, /v1/healthz, /v1/stream (WS)</text>

  <!-- Arrow extension -> agent -->
  <line x1="370" y1="328" x2="370" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="343" fill="#475569">mTLS WSS</text>

  <!-- Policy server / dashboard -->
  <rect x="720" y="100" width="440" height="320" rx="14" fill="url(#g3)" stroke="#d97706" stroke-width="1.5"/>
  <text x="740" y="128" font-weight="700" fill="#78350f">Hospital Server</text>

  <rect x="740" y="148" width="400" height="120" rx="10" fill="#fff" stroke="#94a3b8"/>
  <text x="760" y="172" font-weight="700">Policy Server (Node.js)</text>
  <text x="760" y="192" fill="#334155">• JWT + RBAC (admin/security/auditor/helpdesk)</text>
  <text x="760" y="210" fill="#334155">• Ed25519 signed policy bundle distribution</text>
  <text x="760" y="228" fill="#334155">• Incident ingest + override mint</text>
  <text x="760" y="246" fill="#334155">• Postgres (or SQLite dev)</text>
  <text x="760" y="262" fill="#334155">• SIEM forwarder (Splunk HEC / syslog / webhook)</text>

  <rect x="740" y="288" width="400" height="120" rx="10" fill="#fff" stroke="#94a3b8"/>
  <text x="760" y="312" font-weight="700">Admin Dashboard (React + Tailwind)</text>
  <text x="760" y="332" fill="#334155">• Incidents • Policy editor • Endpoints fleet</text>
  <text x="760" y="350" fill="#334155">• Audit search • Override approval</text>
  <text x="760" y="368" fill="#334155">• Charts: incidents/day, top rules, fleet health</text>

  <!-- SIEM -->
  <rect x="720" y="450" width="440" height="100" rx="14" fill="#ecfdf5" stroke="#059669"/>
  <text x="740" y="478" font-weight="700" fill="#064e3b">SIEM (Splunk / QRadar / Elastic)</text>
  <text x="740" y="500" fill="#334155">• incident.created • incident.override</text>
  <text x="740" y="518" fill="#334155">• agent.tamper_detected • policy.updated</text>
  <text x="740" y="536" fill="#334155">• auth.failure</text>

  <!-- Arrows agent -> server -->
  <line x1="660" y1="500" x2="720" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="660" y="320" fill="#475569" transform="rotate(-22 660 320)">heartbeat / incidents (mTLS)</text>

  <line x1="720" y1="220" x2="660" y2="490" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="700" y="380" fill="#475569" transform="rotate(70 700 380)">signed policy</text>

  <line x1="940" y1="408" x2="940" y2="450" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Footer -->
  <rect x="40" y="660" width="1120" height="80" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="60" y="684" font-weight="700">Detection pipeline</text>
  <text x="60" y="706" fill="#334155">Input → Parser/OCR → Chunker → Regex • NER • ML scorer → Composite scorer + Policy → ALLOW / WARN / BLOCK</text>
  <text x="60" y="726" fill="#334155">Privacy: only metadata leaves the endpoint. Raw matches stay in encrypted local audit (reveal-token workflow).</text>
</svg>
